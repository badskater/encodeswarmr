# Default values for encodeswarmr.
# Override these in a values file passed to `helm install -f myvalues.yaml`.

# -- Number of controller replicas (typically 1; increase only with HA Postgres).
replicaCount: 1

image:
  controller:
    repository: ghcr.io/badskater/encodeswarmr-controller
    tag: ""        # Defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  agent:
    repository: ghcr.io/badskater/encodeswarmr-agent
    tag: ""
    pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount for the controller.
  create: true
  annotations: {}
  name: ""

# ---------------------------------------------------------------------------
# Controller
# ---------------------------------------------------------------------------
controller:
  # -- HTTP port the controller listens on.
  httpPort: 8080
  # -- gRPC port the controller listens on (mTLS).
  grpcPort: 9443
  # -- Extra environment variables injected into the controller pod.
  extraEnv: []
  resources:
    limits:
      cpu: "2"
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # -- Liveness probe settings.
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
    failureThreshold: 3
  # -- Readiness probe settings.
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Agent
# ---------------------------------------------------------------------------
agent:
  # -- Deploy agents as a Deployment (set replicaCount) or DaemonSet.
  kind: Deployment
  replicaCount: 2
  resources:
    limits:
      cpu: "4"
      memory: 2Gi
    requests:
      cpu: "1"
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

# ---------------------------------------------------------------------------
# PostgreSQL connection
# ---------------------------------------------------------------------------
postgres:
  # -- Full DSN for the controller database.  Stored in a Secret.
  dsn: "postgresql://encodeswarmr:changeme@postgres:5432/encodeswarmr?sslmode=disable"

# ---------------------------------------------------------------------------
# Auth / Session
# ---------------------------------------------------------------------------
auth:
  # -- Session secret used to sign cookies.  Must be at least 32 bytes.
  sessionSecret: "changeme-at-least-32-chars-long!!"

# ---------------------------------------------------------------------------
# mTLS certificates
# ---------------------------------------------------------------------------
tls:
  # -- PEM-encoded CA certificate (base64).
  caCert: ""
  # -- PEM-encoded controller certificate (base64).
  cert: ""
  # -- PEM-encoded controller private key (base64).
  key: ""

# ---------------------------------------------------------------------------
# Persistence — shared media volume
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  # -- StorageClass that supports ReadWriteMany (e.g. nfs, azureFile).
  storageClass: ""
  accessMode: ReadWriteMany
  size: 500Gi
  # -- Existing PVC name.  Leave empty to create a new PVC.
  existingClaim: ""

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: encodeswarmr.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ---------------------------------------------------------------------------
# Horizontal Pod Autoscaler (agents)
# ---------------------------------------------------------------------------
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# ---------------------------------------------------------------------------
# SMTP (optional)
# ---------------------------------------------------------------------------
smtp:
  host: ""
  port: 587
  username: ""
  # -- SMTP password. Store in a Secret and reference via extraEnv instead.
  password: ""
  fromAddress: ""
  starttls: true

# ---------------------------------------------------------------------------
# Notification channels (optional)
# ---------------------------------------------------------------------------
notifications:
  telegram:
    botToken: ""
    chatId: ""
  pushover:
    appToken: ""
    userKey: ""
  ntfy:
    topic: ""
    serverUrl: "https://ntfy.sh"
    token: ""

# ---------------------------------------------------------------------------
# File Manager
# ---------------------------------------------------------------------------
fileManager:
  # -- Directories the file manager may access. Empty disables the feature.
  allowedPaths: []
    # - /mnt/nas/media
    # - /mnt/nas/output

# ---------------------------------------------------------------------------
# Watch Folders (optional)
# ---------------------------------------------------------------------------
watchFolders: []
  # - name: incoming
  #   path: /mnt/nas/incoming
  #   windowsPath: "\\\\NAS01\\incoming"
  #   filePatterns: ["*.mkv", "*.mp4"]
  #   pollInterval: 30s
  #   autoAnalyze: true
  #   enabled: true

# ---------------------------------------------------------------------------
# Auto-Scaling (optional)
# ---------------------------------------------------------------------------
autoScaling:
  enabled: false
  webhookUrl: ""
  scaleUpThreshold: 10
  scaleDownThreshold: 3
  cooldownSeconds: 300

# ---------------------------------------------------------------------------
# Output Validation
# ---------------------------------------------------------------------------
validation:
  enabled: true
  minDurationRatio: 0.9

# ---------------------------------------------------------------------------
# Job Archival
# ---------------------------------------------------------------------------
archive:
  enabled: true
  retentionDays: 30

# ---------------------------------------------------------------------------
# Tracing
# ---------------------------------------------------------------------------
tracing:
  enabled: false
  endpoint: "jaeger-collector:4317"
  sampleRate: 0.1
