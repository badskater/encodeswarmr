{{- if eq .Values.agent.kind "DaemonSet" }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "encodeswarmr.fullname" . }}-agent
  labels:
    {{- include "encodeswarmr.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      {{- include "encodeswarmr.agentSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "encodeswarmr.agentSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "encodeswarmr.serviceAccountName" . }}
      containers:
        - name: agent
          image: {{ include "encodeswarmr.agentImage" . }}
          imagePullPolicy: {{ .Values.image.agent.pullPolicy }}
          env:
            {{- with .Values.agent.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/encodeswarmr
              readOnly: true
            - name: media
              mountPath: /data/media
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "encodeswarmr.fullname" . }}-config
        - name: media
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-media" (include "encodeswarmr.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- else }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "encodeswarmr.fullname" . }}-agent
  labels:
    {{- include "encodeswarmr.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  replicas: {{ .Values.agent.replicaCount }}
  selector:
    matchLabels:
      {{- include "encodeswarmr.agentSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "encodeswarmr.agentSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "encodeswarmr.serviceAccountName" . }}
      containers:
        - name: agent
          image: {{ include "encodeswarmr.agentImage" . }}
          imagePullPolicy: {{ .Values.image.agent.pullPolicy }}
          env:
            {{- with .Values.agent.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/encodeswarmr
              readOnly: true
            - name: media
              mountPath: /data/media
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "encodeswarmr.fullname" . }}-config
        - name: media
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-media" (include "encodeswarmr.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
