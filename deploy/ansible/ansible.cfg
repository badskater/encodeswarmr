[defaults]
inventory           = inventory/hosts.yml
roles_path          = roles
host_key_checking   = False
retry_files_enabled = False
stdout_callback     = yaml
callbacks_enabled   = timer, profile_tasks

# Increase timeout for slow hosts or large package installs
timeout = 60

# Limit parallelism to avoid overwhelming hosts during upgrades
# Override per-playbook with -f / --forks
forks = 5

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

[winrm_connection]
# pywinrm must be installed: pip install pywinrm
operation_timeout_sec  = 60
read_timeout_sec       = 70
