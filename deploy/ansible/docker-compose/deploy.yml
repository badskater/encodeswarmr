---
# docker-compose/deploy.yml — Alternative deployment via Docker Compose.
# Installs Docker + Compose on the target host, templates the compose file and
# controller config, then starts the stack with 'docker compose up -d'.
#
# Inventory group: docker_hosts
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml deploy/ansible/docker-compose/deploy.yml
#   ansible-playbook -i inventory/hosts.yml deploy/ansible/docker-compose/deploy.yml \
#     --tags configure   # re-template config only, no package install

- name: Deploy distributed-encoder via Docker Compose
  hosts: docker_hosts
  become: true

  vars:
    compose_dir: "/opt/distributed-encoder"
    compose_file: "/opt/distributed-encoder/docker-compose.yml"
    controller_config_file_docker: "/opt/distributed-encoder/controller.yaml"
    docker_cert_dir: "/opt/distributed-encoder/certs"

  tasks:
    # ── mTLS certs ────────────────────────────────────────────────────────────
    - name: Generate mTLS certificates on control node
      ansible.builtin.import_role:
        name: mtls-certs
      delegate_to: localhost
      run_once: true
      tags: [certs]

    # ── Docker install ────────────────────────────────────────────────────────
    - name: Install required packages for Docker
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true
      tags: [install]

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
        dest: /etc/apt/trusted.gpg.d/docker.asc
        mode: "0644"
      tags: [install]

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >
          deb [arch=amd64 signed-by=/etc/apt/trusted.gpg.d/docker.asc]
          https://download.docker.com/linux/{{ ansible_distribution | lower }}
          {{ ansible_distribution_release }} stable
        state: present
        filename: docker
      tags: [install]

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true
      tags: [install]

    - name: Enable and start Docker service
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
      tags: [install, service]

    # ── Application directory + config ────────────────────────────────────────
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ compose_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      tags: [configure]

    - name: Create certs directory
      ansible.builtin.file:
        path: "{{ docker_cert_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0750"
      tags: [configure, certs]

    - name: Copy CA certificate
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../roles/mtls-certs/files/ca.crt"
        dest: "{{ docker_cert_dir }}/ca.crt"
        mode: "0644"
      tags: [certs]

    - name: Copy controller TLS certificate
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../roles/mtls-certs/files/controller.crt"
        dest: "{{ docker_cert_dir }}/controller.crt"
        mode: "0644"
      tags: [certs]

    - name: Copy controller TLS key
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../roles/mtls-certs/files/controller.key"
        dest: "{{ docker_cert_dir }}/controller.key"
        mode: "0600"
      tags: [certs]

    - name: Create .env file for Docker Compose secrets
      ansible.builtin.copy:
        dest: "{{ compose_dir }}/.env"
        owner: root
        group: root
        mode: "0600"
        content: |
          POSTGRES_PASSWORD={{ db_password }}
      tags: [configure]

    - name: Template controller.yaml for Docker bind mount
      ansible.builtin.template:
        src: templates/controller.yaml.j2
        dest: "{{ controller_config_file_docker }}"
        owner: root
        group: root
        mode: "0640"
      tags: [configure]

    - name: Template docker-compose.yml
      ansible.builtin.template:
        src: templates/docker-compose.yml.j2
        dest: "{{ compose_file }}"
        owner: root
        group: root
        mode: "0644"
      tags: [configure]

    # ── Deploy stack ──────────────────────────────────────────────────────────
    - name: Pull latest images
      ansible.builtin.command:
        cmd: docker compose -f {{ compose_file }} pull
      changed_when: true
      tags: [service]

    - name: Start Docker Compose stack
      ansible.builtin.command:
        cmd: docker compose -f {{ compose_file }} up -d --remove-orphans
      changed_when: true
      tags: [service]

    - name: Wait for controller health check
      ansible.builtin.uri:
        url: "http://localhost:{{ controller_http_port }}/health"
        status_code: 200
      register: _health
      until: _health.status == 200
      retries: 15
      delay: 5
      tags: [service]
