# oapi-codegen configuration for Go client SDK generation.
#
# Usage:
#   go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest \
#     -config api/oapi-codegen.yaml \
#     api/openapi.yaml
#
# The generated file api/generated/go/client.go should be committed and kept
# in sync with the spec by the generate-sdk CI workflow.
#
# oapi-codegen docs: https://github.com/oapi-codegen/oapi-codegen

package: apiclient
output: api/generated/go/client.go

generate:
  # Emit strongly-typed request/response structs.
  models: true
  # Emit a net/http client with typed methods for every operation.
  client: true
  # Do not emit a chi/echo/gin server stub — we only need the client.
  chi-server: false
  echo-server: false
  gin-server: false
  gorilla-server: false
  strict-server: false

# Disable strict response-validation on the client side.
output-options:
  skip-prune: false
