        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Webhook delivery failed
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /webhooks/{id}/deliveries:
    get:
      operationId: listWebhookDeliveries
      summary: List delivery history for a webhook
      description: Requires admin role.
      tags: [webhooks]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Delivery list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/WebhookDelivery"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ─── Users ─────────────────────────────────────────────────────────────────

  /users:
    get:
      operationId: listUsers
      summary: List users
      description: Requires admin role.
      tags: [users]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      operationId: createUser
      summary: Create a user
      description: Requires admin role.
      tags: [users]
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /users/me:
    get:
      operationId: getMe
      summary: Get the current user profile
      tags: [users]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}:
    delete:
      operationId: deleteUser
      summary: Delete a user
      description: Requires admin role.
      tags: [users]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: User deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/role:
    put:
      operationId: updateUserRole
      summary: Update a user role
      description: Requires admin role.
      tags: [users]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [viewer, operator, admin]
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OKEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ─── Audit Log ─────────────────────────────────────────────────────────────

  /audit-log:
    get:
      operationId: listAuditLog
      summary: List audit log entries
      description: Requires admin role.
      tags: [audit]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 500
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated audit log
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CollectionEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AuditEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:

  # ─── Security Schemes ──────────────────────────────────────────────────────

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: HTTP-only session cookie set by POST /auth/login or OIDC callback.
    bearerAuth:
      type: http
      scheme: bearer
      description: API key sent as a Bearer token in the Authorization header.

  # ─── Reusable Parameters ───────────────────────────────────────────────────

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
    PageSize:
      name: page_size
      in: query
      description: Number of items per page. Defaults to 50, maximum 200.
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
    Cursor:
      name: cursor
      in: query
      description: Base64-encoded opaque cursor for the next page.
      schema:
        type: string
    IntCursor:
      name: cursor
      in: query
      description: Integer log-entry ID cursor for the next page.
      schema:
        type: integer
        format: int64

  # ─── Reusable Responses ────────────────────────────────────────────────────

  responses:
    BadRequest:
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Authentication required
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: Insufficient role
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ValidationError:
      description: Validation error (unprocessable entity)
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

  # ─── Schemas ───────────────────────────────────────────────────────────────

  schemas:

    # Envelope / response wrappers

    Envelope:
      type: object
      properties:
        data:
          description: The primary response payload.
        meta:
          $ref: "#/components/schemas/Meta"

    CollectionEnvelope:
      type: object
      properties:
        data:
          type: array
          description: The paginated resource list.
        meta:
          $ref: "#/components/schemas/CollectionMeta"

    Meta:
      type: object
      properties:
        request_id:
          type: string
          description: Correlation identifier echoed from X-Request-ID.

    CollectionMeta:
      allOf:
        - $ref: "#/components/schemas/Meta"
        - type: object
          properties:
            total_count:
              type: integer
              format: int64
            next_cursor:
              type: string
              description: Present when more pages are available.

    OKResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true

    OKEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/OKResponse"

    Problem:
      description: RFC 9457 Problem Details
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        request_id:
          type: string

    # Domain schemas

    Job:
      type: object
      properties:
        id:
          type: string
        source_id:
          type: string
        job_type:
          type: string
          enum: [encode, analysis, audio, hdr_detect]
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        priority:
          type: integer
          default: 0
        target_tags:
          type: array
          items:
            type: string
          nullable: true
        encode_config:
          $ref: "#/components/schemas/EncodeConfig"
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EncodeConfig:
      type: object
      description: Configuration for encode-type jobs.
      properties:
        run_script_template_id:
          type: string
          description: ID of the script template used to generate the run script.
        chunk_boundaries:
          type: array
          description: Frame or time boundaries for chunked encoding.
          items:
            type: integer
        extra_params:
          type: object
          additionalProperties:
            type: string
          description: Additional key-value parameters injected into the script.

    Task:
      type: object
      properties:
        id:
          type: string
        job_id:
          type: string
        agent_id:
          type: string
          nullable: true
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        chunk_index:
          type: integer
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        progress:
          type: number
          format: float
          description: Encoding progress 0–100.
          nullable: true
        error_msg:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        hostname:
          type: string
        ip_address:
          type: string
        status:
          type: string
          enum: [idle, running, offline, draining, pending_approval]
        tags:
          type: array
          items:
            type: string
          nullable: true
        version:
          type: string
          nullable: true
        vnc_port:
          type: integer
          nullable: true
        current_task_id:
          type: string
          nullable: true
        last_seen_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentMetric:
      type: object
      properties:
        id:
          type: integer
          format: int64
        agent_id:
          type: string
        cpu_pct:
          type: number
          format: float
          nullable: true
        gpu_pct:
          type: number
          format: float
          nullable: true
        memory_pct:
          type: number
          format: float
          nullable: true
        recorded_at:
          type: string
          format: date-time

    AgentBinary:
      type: object
      properties:
        os:
          type: string
          example: windows
        arch:
          type: string
          example: amd64
        url:
          type: string
          example: /api/v1/agent/upgrade/windows/amd64
        sha256:
          type: string
          description: Hex-encoded SHA-256 digest of the binary.

    Source:
      type: object
      properties:
        id:
          type: string
        filename:
          type: string
        unc_path:
          type: string
          description: UNC path (\\server\share\...) or NFS mount path (/mnt/nas/...).
        state:
          type: string
          nullable: true
        hdr_type:
          type: string
          enum: ["", hdr10, "hdr10+", dolby_vision, hlg]
          nullable: true
        dv_profile:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AnalysisResult:
      type: object
      properties:
        id:
          type: string
        source_id:
          type: string
        type:
          type: string
          enum: [vmaf, scene, histogram]
        frame_data:
          description: Raw JSONB frame-level data. Shape varies by analysis type.
          nullable: true
        summary:
          description: Raw JSONB summary. Shape varies by analysis type.
          nullable: true
        created_at:
          type: string
          format: date-time

    SceneBoundaries:
      type: object
      properties:
        source_id:
          type: string
        fps:
          type: number
          format: double
        total_frames:
          type: integer
        duration_sec:
          type: number
          format: double
        scenes:
          type: array
          items:
            $ref: "#/components/schemas/SceneBoundary"

    SceneBoundary:
      type: object
      properties:
        frame:
          type: integer
        pts:
          type: number
          format: double
        timecode:
          type: string
          example: "00:01:23.12"

    Template:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        type:
          type: string
          description: Template file type (e.g. avs, vpy, bat).
        extension:
          type: string
          example: avs
        content:
          type: string
          description: Go template body with {{.Variable}} placeholders.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Variable:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        value:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PathMapping:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        windows_prefix:
          type: string
          description: UNC path prefix on Windows agents (e.g. \\\\nas\\media).
        linux_prefix:
          type: string
          description: NFS mount prefix on the Linux controller (e.g. /mnt/nas/media).
        enabled:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Webhook:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
          enum: [discord, teams, slack]
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
          example: [job.completed, job.failed]
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WebhookDelivery:
      type: object
      properties:
        id:
          type: integer
          format: int64
        webhook_id:
          type: string
        event:
          type: string
        payload:
          description: Raw JSON payload that was sent.
          nullable: true
        success:
          type: boolean
        response_code:
          type: integer
          nullable: true
        error_msg:
          type: string
          nullable: true
        attempt:
          type: integer
        delivered_at:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [viewer, operator, admin]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EnrollmentToken:
      type: object
      description: Enrollment token record (token value omitted).
      properties:
        id:
          type: string
        used_by:
          type: string
          nullable: true
          description: Agent ID that consumed this token.
        used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    EnrollmentTokenCreate:
      allOf:
        - $ref: "#/components/schemas/EnrollmentToken"
        - type: object
          properties:
            token:
              type: string
              description: The one-time token value. Only returned at creation time.

    LogEntry:
      type: object
      properties:
        id:
          type: integer
          format: int64
        task_id:
          type: string
        stream:
          type: string
          enum: [stdout, stderr]
        level:
          type: string
          enum: [info, warn, error, debug]
        message:
          type: string
        logged_at:
          type: string
          format: date-time

    AuditEntry:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: string
          nullable: true
        username:
          type: string
        action:
          type: string
          example: agent.approve
        resource:
          type: string
          example: agent
        resource_id:
          type: string
        ip_address:
          type: string
        created_at:
          type: string
          format: date-time

    # Request bodies

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    SetupRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    AgentEnrollRequest:
      type: object
      required: [token, csr_pem]
      properties:
        token:
          type: string
          description: One-time enrollment token.
        csr_pem:
          type: string
          description: PEM-encoded certificate signing request.

    CreateJobRequest:
      type: object
      required: [source_id, job_type]
      properties:
        source_id:
          type: string
        job_type:
          type: string
          enum: [encode, analysis, audio]
        priority:
          type: integer
          default: 0
        target_tags:
          type: array
          items:
            type: string
          nullable: true
        encode_config:
          $ref: "#/components/schemas/EncodeConfig"

    CreateSourceRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: UNC path (\\\\server\\share\\...) or NFS mount path (/mnt/nas/...).
        name:
          type: string
          description: Optional display name. Defaults to the filename component of path.

    EncodeSourceRequest:
      type: object
      properties:
        priority:
          type: integer
          default: 0
        target_tags:
          type: array
          items:
            type: string
          nullable: true
        job_type:
          type: string
          enum: [encode, audio]
          default: encode

    UpdateSourceHDRRequest:
      type: object
      required: [hdr_type]
      properties:
        hdr_type:
          type: string
          enum: ["", hdr10, "hdr10+", dolby_vision, hlg]
          description: Empty string means SDR.
        dv_profile:
          type: integer
          default: 0
          description: Dolby Vision profile number (0 if not applicable).

    ScanAnalysisRequest:
      type: object
      required: [source_id]
      properties:
        source_id:
          type: string
        analysis_type:
          type: string
          enum: [vmaf, scene, histogram]
          default: vmaf

    CreateTemplateRequest:
      type: object
      required: [name, type, extension, content]
      properties:
        name:
          type: string
        description:
          type: string
        type:
          type: string
          description: Template type (avs, vpy, bat).
        extension:
          type: string
          example: avs
        content:
          type: string
          description: Go template body.

    UpdateTemplateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        content:
          type: string

    UpsertVariableRequest:
      type: object
      required: [value]
      properties:
        value:
          type: string
        description:
          type: string
        category:
          type: string

    CreatePathMappingRequest:
      type: object
      required: [name, windows_prefix, linux_prefix]
      properties:
        name:
          type: string
        windows_prefix:
          type: string
        linux_prefix:
          type: string

    UpdatePathMappingRequest:
      type: object
      required: [name, windows_prefix, linux_prefix]
      properties:
        name:
          type: string
        windows_prefix:
          type: string
        linux_prefix:
          type: string
        enabled:
          type: boolean
          default: true

    CreateWebhookRequest:
      type: object
      required: [name, provider, url, events]
      properties:
        name:
          type: string
        provider:
          type: string
          enum: [discord, teams, slack]
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
          example: [job.completed, job.failed]
        secret:
          type: string
          description: Optional HMAC signing secret.

    UpdateWebhookRequest:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        enabled:
          type: boolean

    CreateUserRequest:
      type: object
      required: [username, email, role]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [viewer, operator, admin]
        password:
          type: string
          format: password
          description: Optional for OIDC-only users.
