openapi: "3.1.0"

info:
  title: Distributed Encoder API
  version: "1.0.0"
  description: >
    REST API for the Distributed Encoder controller. Manages encoding jobs,
    agents, sources, templates, variables, webhooks, users, and audit logs.
    All versioned endpoints are prefixed with /api/v1.

servers:
  - url: /api/v1
    description: Versioned API base path

security:
  - cookieAuth: []
  - bearerAuth: []

tags:
  - name: system
    description: Health, metrics, and setup
  - name: auth
    description: Authentication (login, logout, OIDC)
  - name: jobs
    description: Encoding and analysis jobs
  - name: tasks
    description: Individual tasks within a job
  - name: agents
    description: Encoding agents
  - name: agent-tokens
    description: One-time agent enrollment tokens
  - name: sources
    description: Source video files
  - name: analysis
    description: Video analysis results
  - name: templates
    description: Script templates (AviSynth, VapourSynth, batch)
  - name: variables
    description: Global script variables
  - name: path-mappings
    description: UNC to Linux NFS path translation mappings
  - name: webhooks
    description: Webhook notification targets
  - name: users
    description: User management
  - name: audit
    description: Audit log

paths:

  # ─── System ────────────────────────────────────────────────────────────────

  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags: [system]
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        "503":
          description: Database unreachable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics
      description: Returns job and agent counts in Prometheus text format.
      tags: [system]
      security: []
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string

  /api/v1/openapi.json:
    get:
      operationId: getOpenAPISpec
      summary: OpenAPI specification (JSON)
      tags: [system]
      security: []
      responses:
        "200":
          description: OpenAPI 3.1 JSON spec
          content:
            application/json:
              schema:
                type: object

  # ─── Setup wizard ──────────────────────────────────────────────────────────

  /setup/status:
    get:
      operationId: getSetupStatus
      summary: Setup status
      description: Reports whether initial admin setup is still required.
      tags: [system]
      security: []
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          required:
                            type: boolean

  /setup:
    post:
      operationId: setup
      summary: Create first admin user
      description: Only callable once, before any admin users exist.
      tags: [system]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupRequest"
      responses:
        "201":
          description: Admin user created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
        "409":
          description: Setup already completed
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ─── Auth ──────────────────────────────────────────────────────────────────

  /auth/login:
    post:
      operationId: login
      summary: Log in with username and password
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful; session cookie set
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          expires_at:
                            type: string
                            format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/logout:
    post:
      operationId: logout
      summary: Log out and invalidate session
      tags: [auth]
      security: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OKResponse"

  /auth/oidc:
    get:
      operationId: oidcRedirect
      summary: Initiate OIDC login flow
      description: Redirects to the OIDC provider. Returns 404 if OIDC is not configured.
      tags: [auth]
      security: []
      responses:
        "302":
          description: Redirect to OIDC provider
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/oidc/callback:
    get:
      operationId: oidcCallback
      summary: OIDC callback
      description: Handles the authorization code callback from the OIDC provider.
      tags: [auth]
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to UI after successful login
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Agent enrollment ──────────────────────────────────────────────────────

  /agent/enroll:
    post:
      operationId: agentEnroll
      summary: Enroll a new agent
      description: >
        Validates a one-time enrollment token, signs the agent's CSR, and
        returns a signed mTLS certificate. No session required.
      tags: [agents]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentEnrollRequest"
      responses:
        "200":
          description: CSR signed; certificate returned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          cert_pem:
                            type: string
                            description: PEM-encoded signed certificate
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ─── Agent upgrade ─────────────────────────────────────────────────────────

  /agent/upgrade/check:
    get:
      operationId: agentUpgradeCheck
      summary: Check available agent upgrade
      description: Returns the current agent version and list of available binaries.
      tags: [agents]
      security: []
      responses:
        "200":
          description: Upgrade info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          version:
                            type: string
                            example: "1.0.3"
                          available:
                            type: array
                            items:
                              $ref: "#/components/schemas/AgentBinary"

  /agent/upgrade/{os}/{arch}:
    get:
      operationId: agentUpgradeDownload
      summary: Download agent binary
      description: Streams the agent binary for the specified OS and architecture.
      tags: [agents]
      security: []
      parameters:
        - name: os
          in: path
          required: true
          schema:
            type: string
            example: windows
        - name: arch
          in: path
          required: true
          schema:
            type: string
            example: amd64
      responses:
        "200":
          description: Binary stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── WebSocket live events ──────────────────────────────────────────────────

  /ws:
    get:
      operationId: websocketConnect
      summary: WebSocket live event stream
      description: >
        Upgrades to a WebSocket connection. Broadcasts real-time events
        (job status changes, agent status changes, log lines) to connected clients.
        Requires viewer role or higher.
      tags: [system]
      security:
        - cookieAuth: []
      responses:
        "101":
          description: WebSocket upgrade successful
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Jobs ──────────────────────────────────────────────────────────────────

  /jobs:
    get:
      operationId: listJobs
      summary: List jobs
      description: Returns a cursor-paginated list of jobs, optionally filtered by status.
      tags: [jobs]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, running, completed, failed, cancelled]
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Paginated job list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CollectionEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Job"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createJob
      summary: Create a job
      description: >
        Creates an encode, analysis, or audio job.
        Encode jobs require encode_config with run_script_template_id and chunk_boundaries.
      tags: [jobs]
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Job"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /jobs/{id}:
    get:
      operationId: getJob
      summary: Get a job with its tasks
      tags: [jobs]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Job with tasks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          job:
                            $ref: "#/components/schemas/Job"
                          tasks:
                            type: array
                            items:
                              $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /jobs/{id}/cancel:
    post:
      operationId: cancelJob
      summary: Cancel a job
      description: Cancels the job and all its pending tasks.
      tags: [jobs]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Job cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OKEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /jobs/{id}/retry:
    post:
      operationId: retryJob
      summary: Retry a failed job
      description: Resets failed tasks to queued and sets job status back to queued.
      tags: [jobs]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Job retried
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OKEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /jobs/{id}/logs:
    get:
      operationId: listJobLogs
      summary: List logs for all tasks in a job
      tags: [jobs]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: stream
          in: query
          description: Filter by log stream (stdout or stderr)
          schema:
            type: string
            enum: [stdout, stderr]
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/IntCursor"
      responses:
        "200":
          description: Paginated log entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CollectionEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/LogEntry"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Tasks ─────────────────────────────────────────────────────────────────

  /tasks/{id}:
    get:
      operationId: getTask
      summary: Get a task by ID
      tags: [tasks]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /tasks/{id}/logs:
    get:
      operationId: listTaskLogs
      summary: List logs for a task
      tags: [tasks]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: stream
          in: query
          schema:
            type: string
            enum: [stdout, stderr]
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/IntCursor"
      responses:
        "200":
          description: Paginated log entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CollectionEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/LogEntry"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tasks/{id}/logs/tail:
    get:
      operationId: tailTaskLogs
      summary: Tail task logs as Server-Sent Events
      description: Streams new log entries as SSE until the client disconnects.
      tags: [tasks]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: after_id
          in: query
          description: Only emit log entries with ID greater than this value
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: SSE stream of log entries
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tasks/{id}/logs/download:
    get:
      operationId: downloadTaskLogs
      summary: Download all task logs as plain text
      tags: [tasks]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Plain text log file download
          content:
            text/plain:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ─── Agents ────────────────────────────────────────────────────────────────

  /agents:
    get:
      operationId: listAgents
      summary: List all agents
      tags: [agents]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Agent"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /agents/{id}:
    get:
      operationId: getAgent
      summary: Get an agent by ID
      tags: [agents]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Agent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{id}/metrics:
    get:
      operationId: getAgentMetrics
      summary: Get agent time-series metrics
      description: Returns CPU/GPU/memory samples for the agent within the specified time window.
      tags: [agents]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: window
          in: query
          description: Duration string (e.g. 1h, 30m). Defaults to 1h.
          schema:
            type: string
            default: "1h"
            example: "30m"
      responses:
        "200":
          description: Metric samples
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AgentMetric"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{id}/drain:
    post:
      operationId: drainAgent
      summary: Drain an agent
      description: Sets agent status to draining so it completes its current task and accepts no new work.
      tags: [agents]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Agent draining
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OKEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{id}/approve:
    post:
      operationId: approveAgent
      summary: Approve a pending agent
      description: Moves an agent from pending_approval to idle, allowing it to accept tasks.
      tags: [agents]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Agent approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OKEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Agent is not pending approval
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /agents/{id}/vnc:
    get:
      operationId: agentVNCProxy
      summary: WebSocket VNC proxy for agent remote desktop
      description: >
        Upgrades to WebSocket and proxies noVNC binary frames to the agent's
        VNC TCP port. The agent must have a VNC port configured.
        Requires operator role or higher.
      tags: [agents]
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "101":
          description: WebSocket upgrade — VNC proxy started
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Agent has no VNC port configured
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "502":
          description: Cannot connect to agent VNC port
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  # ─── Agent enrollment tokens ───────────────────────────────────────────────

  /agent-tokens:
    get:
      operationId: listEnrollmentTokens
      summary: List enrollment tokens
      description: Returns all tokens (without the token value). Requires admin role.
      tags: [agent-tokens]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Enrollment token list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/EnrollmentToken"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      operationId: createEnrollmentToken
      summary: Create an enrollment token
      description: >
        Creates a one-time token for enrolling a new agent. The token value is
        only returned in this response and cannot be retrieved again.
        Requires admin role.
      tags: [agent-tokens]
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                expires_in:
                  type: string
                  description: Go duration string (e.g. 24h, 72h). Defaults to 24h.
                  example: "48h"
      responses:
        "201":
          description: Token created (token value shown once)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/EnrollmentTokenCreate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /agent-tokens/{id}:
    delete:
      operationId: deleteEnrollmentToken
      summary: Delete an enrollment token
      description: Requires admin role.
      tags: [agent-tokens]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Token deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Sources ───────────────────────────────────────────────────────────────

  /sources:
    get:
      operationId: listSources
      summary: List sources
      description: Returns a cursor-paginated list of source files, optionally filtered by state.
      tags: [sources]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Paginated source list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CollectionEnvelope"
                  - type: object
                    properties:
                      data:
