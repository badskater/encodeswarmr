# nFPM package descriptor — EncodeSwarmr Controller
#
# Build:
#   VERSION=1.2.0 nfpm package --config nfpm.yaml --packager deb --target dist/
#
# Or via Makefile:
#   make deb VERSION=1.2.0
#
# Install nFPM:
#   go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

name:        encodeswarmr-controller
arch:        amd64
platform:    linux
version:     ${VERSION}
maintainer:  "badskater"
description: |
  EncodeSwarmr Controller.
  Orchestrates distributed video encoding across agents (Windows/Linux).
  Includes embedded React web UI, REST API (port 8080), gRPC with mTLS
  (port 9443), PostgreSQL job queue, webhooks, HA failover, job scheduling,
  cloud storage (S3/GCS/Azure), controller-side analysis and chunk concat
  via ffmpeg, plugin system, encoding presets, and OpenAPI 3.1 spec.
homepage:    https://github.com/badskater/encodeswarmr
license:     AGPL-3.0
section:     misc
priority:    optional

depends:
  - adduser
  - ca-certificates

recommends:
  - ffmpeg
  - postgresql-client

contents:
  # ── Controller binary ───────────────────────────────────────────────────────
  - src: bin/controller
    dst: /usr/bin/encodeswarmr-controller
    file_info:
      mode: 0755

  # ── Config template (not overwritten on upgrade) ───────────────────────────
  - src: configs/controller.yaml.example
    dst: /etc/encodeswarmr/controller.yaml
    type: config|noreplace

  # ── Database migrations ────────────────────────────────────────────────────
  - src: internal/db/migrations/
    dst: /usr/share/encodeswarmr/migrations/

  # ── Certs directory (operator populates with mTLS certs) ──────────────────
  - dst: /etc/encodeswarmr/certs
    type: dir
    file_info:
      mode: 0750
      owner: encodeswarmr
      group: encodeswarmr

  # ── Systemd service unit ────────────────────────────────────────────────────
  - src: deployments/deb/encodeswarmr-controller.service
    dst: /lib/systemd/system/encodeswarmr-controller.service

scripts:
  postinstall: deployments/deb/postinstall.sh
  preremove:   deployments/deb/preremove.sh
  postremove:  deployments/deb/postremove.sh
