name: Release

# Triggered by a semver tag push (e.g. v1.2.3).
# Produces artifacts attached to the GitHub Release:
#   - encodeswarmr-controller_<ver>_linux_amd64.deb / .rpm
#   - encodeswarmr-agent_<ver>_linux_amd64.deb / .rpm
#   - encodeswarmr-agent.exe  (Windows amd64 binary)
#   - encodeswarmr-desktop_<ver>_linux_amd64.deb
#   - encodeswarmr-desktop-windows-amd64.exe
#   - ghcr.io/<owner>/encodeswarmr-controller:<ver>  (container)
#
# The Inno Setup Windows installer is built separately by installer.yml.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create/update GitHub Release and upload assets
  packages: write   # push container image to ghcr.io

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Controller: .deb package ──────────────────────────────────────────────────
  controller-deb:
    name: Controller .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI
        run: cd web && npm ci && npm run build

      - name: Build controller binary (linux/amd64)
        run: |
          mkdir -p bin
          VERSION="${GITHUB_REF_NAME#v}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o bin/controller ./cmd/controller

      - name: Install nFPM
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.43.1

      - name: Package controller .deb
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}" \
            nfpm package --config nfpm.yaml --packager deb --target dist/

      - name: Upload controller .deb to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/encodeswarmr-controller_*.deb

  # ── Controller: container image ──────────────────────────────────────────────
  controller-container:
    name: Controller container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/encodeswarmr-controller
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push controller image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployments/Dockerfile.controller
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Agent: Linux .deb package ─────────────────────────────────────────────────
  agent-linux-deb:
    name: Agent Linux .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build agent binary (linux/amd64)
        run: |
          mkdir -p bin
          VERSION="${GITHUB_REF_NAME#v}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o bin/agent ./cmd/agent

      - name: Install nFPM
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.43.1

      - name: Package agent .deb
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}" \
            nfpm package --config nfpm-agent.yaml --packager deb --target dist/

      - name: Upload agent .deb to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/encodeswarmr-agent_*.deb

  # ── Controller: .rpm package ─────────────────────────────────────────────────
  controller-rpm:
    name: Controller .rpm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI
        run: cd web && npm ci && npm run build

      - name: Build controller binary (linux/amd64)
        run: |
          mkdir -p bin
          VERSION="${GITHUB_REF_NAME#v}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o bin/controller ./cmd/controller

      - name: Install nFPM
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.43.1

      - name: Package controller .rpm
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}" \
            nfpm package --config nfpm-rpm.yaml --packager rpm --target dist/

      - name: Upload controller .rpm to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/encodeswarmr-controller*.rpm

  # ── Agent: Linux .rpm package ─────────────────────────────────────────────────
  agent-linux-rpm:
    name: Agent Linux .rpm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build agent binary (linux/amd64)
        run: |
          mkdir -p bin
          VERSION="${GITHUB_REF_NAME#v}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o bin/agent ./cmd/agent

      - name: Install nFPM
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.43.1

      - name: Package agent .rpm
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}" \
            nfpm package --config nfpm-agent-rpm.yaml --packager rpm --target dist/

      - name: Upload agent .rpm to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/encodeswarmr-agent*.rpm

  # ── Agent: Windows .exe ───────────────────────────────────────────────────────
  agent-windows-exe:
    name: Agent Windows .exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build agent binary (windows/amd64)
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o dist/agent-windows-amd64.exe ./cmd/agent

      - name: Upload agent .exe to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/agent-windows-amd64.exe

  # ── Desktop: Linux .deb package ──────────────────────────────────────────────
  desktop-linux-deb:
    name: Desktop Linux .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Install Gio system dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc pkg-config libwayland-dev libx11-dev libx11-xcb-dev libxkbcommon-x11-dev libgles2-mesa-dev libegl1-mesa-dev libffi-dev libxcursor-dev libvulkan-dev

      - name: Build desktop binary (linux/amd64)
        run: |
          mkdir -p bin
          VERSION="${GITHUB_REF_NAME#v}"
          GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o bin/encodeswarmr-desktop ./cmd/desktop

      - name: Install nFPM
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.43.1

      - name: Package desktop .deb
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}" \
            nfpm package --config nfpm-desktop.yaml --packager deb --target dist/

      - name: Upload desktop .deb to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/encodeswarmr-desktop_*.deb

  # ── Desktop: Windows .exe ────────────────────────────────────────────────────
  desktop-windows-exe:
    name: Desktop Windows .exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build desktop binary (windows/amd64)
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -ldflags="-s -w -H=windowsgui -X main.Version=${VERSION}" \
            -o dist/encodeswarmr-desktop-windows-amd64.exe ./cmd/desktop

      - name: Upload desktop .exe to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/encodeswarmr-desktop-windows-amd64.exe
