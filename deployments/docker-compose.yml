services:
  controller:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.controller
    ports:
      - "8080:8080"
      - "9443:9443"
    env_file:
      - ../.env
    environment:
      # Set if dovi_tool is installed at a non-default path (default: /usr/local/bin/dovi_tool)
      # DOVI_TOOL_BIN: /usr/local/bin/dovi_tool
      # Cloud storage credentials (optional)
      # AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      # AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-sa.json
    volumes:
      # Mount NAS NFS shares so the analysis runner can access source files.
      # Paths must match the linux_prefix values in path_mappings config.
      # - /mnt/nas/media:/mnt/nas/media:rw
      # - /mnt/nas/encodes:/mnt/nas/encodes:rw
      # - /mnt/nas/temp:/mnt/nas/temp:rw
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/controller", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: encodeswarmr
      POSTGRES_USER: encodeswarmr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encodeswarmr"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: "postgres://encodeswarmr:${POSTGRES_PASSWORD}@postgres:5432/encodeswarmr"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
    depends_on:
      - postgres
    ports:
      - "6432:5432"

volumes:
  postgres_data:
