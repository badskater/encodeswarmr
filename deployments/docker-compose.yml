services:
  controller:
    image: ghcr.io/badskater/encodeswarmr-controller:latest
    ports:
      - "8080:8080"
      - "9443:9443"
    env_file:
      - ../.env
    volumes:
      # Controller configuration — copy configs/controller.yaml.example,
      # customise it, and place it at ../configs/controller.yaml
      - ../configs/controller.yaml:/etc/encodeswarmr/controller.yaml:ro
      # mTLS certificates for gRPC agent communication
      - ../certs:/etc/encodeswarmr/certs:ro
      # Persistent data directories
      - thumbnails_data:/var/lib/encodeswarmr/thumbnails
      - agent_bins:/var/lib/encodeswarmr/binaries
      # Mount NAS NFS shares so the analysis runner can access source files.
      # Paths must match the linux_prefix values in path_mappings config.
      # Uncomment and adjust for your environment:
      # - /mnt/nas/media:/mnt/nas/media:rw
      # - /mnt/nas/encodes:/mnt/nas/encodes:rw
      # - /mnt/nas/temp:/mnt/nas/temp:rw
    command: ["run", "--config", "/etc/encodeswarmr/controller.yaml"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: encodeswarmr
      POSTGRES_USER: encodeswarmr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encodeswarmr"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: "postgres://encodeswarmr:${POSTGRES_PASSWORD}@postgres:5432/encodeswarmr"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
    depends_on:
      - postgres
    ports:
      - "6432:5432"

volumes:
  postgres_data:
  thumbnails_data:
  agent_bins:
